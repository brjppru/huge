{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": {{ site.Title | jsonify }},
      "url": {{ site.BaseURL | jsonify }}
    },
    {
      "@type": {{ site.Params.schema.publisherType | default "Person" | title | jsonify }},
      "name": {{ site.Title | jsonify }},
      "url": {{ site.BaseURL | jsonify }},
      "description": {{ site.Params.description | default "" | jsonify }},
      "sameAs": {{ site.Params.schema.sameAs | default slice | jsonify }}
    }
  ]
}
</script>
{{- else }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ site.Params.description | default "" | jsonify }}{{ end }},
  "url": {{ .Permalink | jsonify }},
  "isPartOf": {
    "@type": "WebSite",
    "name": {{ site.Title | jsonify }},
    "url": {{ site.BaseURL | jsonify }}
  }
}
</script>
{{- end }}
